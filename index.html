<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/style.css" />
    <script src="./script/script.js" defer></script>
  </head>
  <body>
    <div class="wrapper flex">
      <div class="game-board">
        <div class="cell flex" data-cell="0"></div>
        <div class="cell flex" data-cell="1"></div>
        <div class="cell flex" data-cell="2"></div>
        <div class="cell flex" data-cell="3"></div>
        <div class="cell flex" data-cell="4"></div>
        <div class="cell flex" data-cell="5"></div>
        <div class="cell flex" data-cell="6"></div>
        <div class="cell flex" data-cell="7"></div>
        <div class="cell flex" data-cell="8"></div>
      </div>
      <div class="announce" data-announce>&nbsp;</div>
    </div>
  </body>
</html>
