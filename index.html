<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Montserrat&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="./style/style.css" />
    <script src="./script/script.js" defer></script>
  </head>
  <body>
    <div class="wrapper flex">
      <div class="top flex">
        <div>
          <div>Name: <span data-name=""></span></div>
          <div>Character: <span data-char=""></span></div>
        </div>
        <button type="button" class="change-btn" data-button="change">
          Change
        </button>
      </div>
      <div class="game-board">
        <div class="cell flex" data-cell="0"></div>
        <div class="cell flex" data-cell="1"></div>
        <div class="cell flex" data-cell="2"></div>
        <div class="cell flex" data-cell="3"></div>
        <div class="cell flex" data-cell="4"></div>
        <div class="cell flex" data-cell="5"></div>
        <div class="cell flex" data-cell="6"></div>
        <div class="cell flex" data-cell="7"></div>
        <div class="cell flex" data-cell="8"></div>
      </div>
      <div class="announce" data-announce="">&nbsp;</div>
      <button type="button" data-button="restart">Restart</button>
      <dialog class="modal" data-modal="">
        <form action="#" method="get" class="flex" data-form="">
          <div class="name-input flex">
            <label for="name">Name</label>
            <input
              type="text"
              name="name"
              id="name"
              data-input="name"
              required />
          </div>
          <fieldset class="flex">
            <legend>Character</legend>
            <select name="character" id="character" data-select="">
              <option value="x">X</option>
              <option value="o">O</option>
            </select>
          </fieldset>
          <button type="submit">Submit</button>
        </form>
      </dialog>
    </div>
  </body>
</html>
